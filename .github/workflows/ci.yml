name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  quality:
    name: Quality (Ubuntu, Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Check API reference drift
        run: uv run python scripts/generate_api_reference.py --check

      - name: Check markdown links
        run: uv run python scripts/check_markdown_links.py

      - name: Ruff
        run: uv run ruff check .

      - name: Ty
        run: uv run ty check src tests scripts

      - name: Pytest with coverage
        run: uv run pytest --cov=bustan --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  supported-platforms:
    name: Supported Platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest"]
        python-version: ["3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Pytest
        run: uv run pytest

  examples:
    name: Example Execution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Run checked-in examples
        run: uv run python scripts/run_examples.py

  package:
    name: Package Verification
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Build distributions
        run: uv build

      - name: Check distribution metadata
        run: uvx --from twine twine check dist/*

      - name: Smoke install wheel
        run: uv run python scripts/package_smoke_check.py
