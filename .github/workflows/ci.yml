name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  quality:
    name: Quality (Ubuntu, Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Check API reference drift
        run: uv run python scripts/generate_api_reference.py --check

      - name: Check markdown links
        run: uv run python scripts/check_markdown_links.py

      - name: Ruff
        run: uv run ruff check .

      - name: Ty
        run: uv run ty check src tests scripts

      - name: Pytest with coverage
        run: uv run pytest --cov=bustan --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  supported-platforms:
    name: Supported Platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest"]
        python-version: ["3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Pytest
        run: uv run pytest

  examples:
    name: Example Execution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Run checked-in examples
        run: |
          cd examples/blog_api && uv run python -m blog_api.app
          cd ../../examples/multi_module_app && uv run python -m multi_module_app.app
          cd ../../examples/graph_inspection && uv run python -m graph_inspection.app
          cd ../../examples/request_scope_pipeline_app && uv run python -m request_scope_pipeline_app.app
          cd ../../examples/testing_overrides && uv run python -m testing_overrides.app
          cd ../../examples/dynamic_module_usage && uv run python -m dynamic_module_usage.app

  package:
    name: Package Verification
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Build distributions
        run: uv build

      - name: Check distribution metadata
        run: uvx --from twine twine check dist/*

      - name: Smoke install wheel
        run: |
          python -m venv .package-smoke
          . .package-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import bustan; print(bustan.__version__)"
          bustan --help
          cli_smoke_root="$(mktemp -d)"
          cd "$cli_smoke_root"
          printf '[project]\nname = "smoke-app"\nversion = "0.1.0"\nrequires-python = ">=3.13"\ndependencies = []\n\n[build-system]\nrequires = ["uv_build"]\nbuild-backend = "uv_build"\n' > pyproject.toml
          bustan init
          test -f "$cli_smoke_root/src/smoke_app/__init__.py"
          test -f "$cli_smoke_root/src/smoke_app/app_module.py"
          test -f "$cli_smoke_root/src/smoke_app/app_controller.py"
          test -f "$cli_smoke_root/src/smoke_app/app_service.py"
          test -f "$cli_smoke_root/tests/smoke_app/test_app_controller.py"
          test -f "$cli_smoke_root/tests/smoke_app/test_app_service.py"
          test -f "$cli_smoke_root/tests/smoke_app/test_app_module.py"
          grep -q 'start = "smoke_app:main"' "$cli_smoke_root/pyproject.toml"
          grep -q 'dev = "smoke_app:dev"' "$cli_smoke_root/pyproject.toml"
