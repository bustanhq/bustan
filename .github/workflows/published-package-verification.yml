name: Published Package Verification

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Published package version to verify, for example 0.1.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Verify Published Package
    runs-on: ubuntu-latest

    env:
      INPUT_VERSION: ${{ github.event.inputs.version }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Resolve published version
        run: |
          version="$INPUT_VERSION"
          if [ -z "$version" ]; then
            version="$RELEASE_TAG"
          fi
          version="${version#v}"
          if [ -z "$version" ]; then
            echo "A version is required from the release tag or workflow input." >&2
            exit 1
          fi
          echo "STAR_VERSION=$version" >> "$GITHUB_ENV"

      - name: Verify pip install and console entry point
        run: |
          python -m venv .published-smoke
          . .published-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "bustan==${STAR_VERSION}"
          python -c "import bustan; print(bustan.__version__)"
          bustan --help

      - name: Verify uvx scaffolding from published artifact
        run: |
          cli_smoke_root="$(mktemp -d)"
          uvx --from "bustan==${STAR_VERSION}" bustan create smoke-app --directory "$cli_smoke_root"
          test -f "$cli_smoke_root/smoke-app/pyproject.toml"
          test -f "$cli_smoke_root/smoke-app/README.md"
          test -f "$cli_smoke_root/smoke-app/src/smoke_app/app.py"
          test -f "$cli_smoke_root/smoke-app/tests/test_app.py"