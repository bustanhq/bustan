name: Published Package Verification

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Published package version to verify, for example 0.1.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Verify Published Package
    runs-on: ubuntu-latest

    env:
      INPUT_VERSION: ${{ github.event.inputs.version }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Resolve published version
        run: |
          version="$INPUT_VERSION"
          if [ -z "$version" ]; then
            version="$RELEASE_TAG"
          fi
          version="${version#v}"
          if [ -z "$version" ]; then
            echo "A version is required from the release tag or workflow input." >&2
            exit 1
          fi
          echo "BUSTAN_VERSION=$version" >> "$GITHUB_ENV"

      - name: Verify pip install and console entry point
        run: |
          python -m venv .published-smoke
          . .published-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "bustan==${BUSTAN_VERSION}"
          python -c "import bustan; print(bustan.__version__)"
          bustan --help

      - name: Verify scaffolding from published artifact
        run: |
          cli_smoke_root="$(mktemp -d)"
          mkdir "$cli_smoke_root/smoke-app"
          cd "$cli_smoke_root/smoke-app"
          uv init --package smoke-app
          uv add "bustan==${BUSTAN_VERSION}"
          uv run bustan init
          test -f "$cli_smoke_root/smoke-app/pyproject.toml"
          test -f "$cli_smoke_root/smoke-app/README.md"
          test -f "$cli_smoke_root/smoke-app/src/smoke_app/__init__.py"
          test -f "$cli_smoke_root/smoke-app/src/smoke_app/app_module.py"
          test -f "$cli_smoke_root/smoke-app/src/smoke_app/app_controller.py"
          test -f "$cli_smoke_root/smoke-app/src/smoke_app/app_service.py"
          test -f "$cli_smoke_root/smoke-app/tests/smoke_app/test_app_controller.py"
          test -f "$cli_smoke_root/smoke-app/tests/smoke_app/test_app_service.py"
          test -f "$cli_smoke_root/smoke-app/tests/smoke_app/test_app_module.py"
          grep -q 'start = "smoke_app:main"' "$cli_smoke_root/smoke-app/pyproject.toml"
          grep -q 'dev = "smoke_app:dev"' "$cli_smoke_root/smoke-app/pyproject.toml"
