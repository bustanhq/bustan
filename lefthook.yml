pre-commit:
  parallel: true
  commands:
    ruff:
      run: uv run ruff check .
    ty:
      run: uv run ty check src tests examples scripts
    api-ref:
      run: uv run python scripts/generate_api_reference.py

pre-push:
  jobs:
    - name: pytest
      run: uv run python -m pytest
    - name: markdown-links
      run: uv run python scripts/check_markdown_links.py
    - name: examples
      run: uv run python scripts/run_examples.py
    - name: package-verification
      run: uv run python scripts/package_smoke_check.py
